<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sisteme Giriş</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #0f0f11; color: #e1e1e6; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; }
        .container { background-color: #1a1a1e; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); width: 100%; max-width: 400px; text-align: center; border: 1px solid #29292e; }
        h2 { margin-bottom: 24px; color: #00adb5; font-size: 26px; letter-spacing: 0.5px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #a8a8b3; font-size: 14px; }
        input { width: 100%; padding: 14px; background-color: #0f0f11; border: 2px solid #29292e; border-radius: 8px; color: #fff; font-size: 16px; transition: all 0.2s; }
        input:focus { outline: none; border-color: #00adb5; background-color: #141417; }
        button { width: 100%; padding: 14px; background-color: #00adb5; border: none; border-radius: 8px; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        button:hover { background-color: #008c95; }
        a { display: inline-block; margin-top: 22px; color: #8d8d99; text-decoration: none; font-size: 14px; transition: color 0.2s; }
        a:hover { color: #00adb5; }
        /* Çoklu Kategori CSS Bildirimleri */
        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; text-align: left; font-weight: 500; }
        .alert.error { background-color: #f75a68; color: #fff; border-left: 6px solid #c53030; }
        .alert.success { background-color: #04d361; color: #0f0f11; border-left: 6px solid #02803b; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Giriş Kontrol</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert {{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/giris" method="POST">
            <div class="form-group">
                <label>Kullanıcı Adı</label>
                <input type="text" name="isim" autocomplete="off" required>
            </div>
            <div class="form-group">
                <label>Şifre</label>
                <input type="password" name="sifre" required>
            </div>
            <button type="submit">Sisteme Bağlan</button>
        </form>
        <a href="/kayit">Yeni Bir Hesap Tanımla</a>
    </div>
</body>
</html>
